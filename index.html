<!DOCTYPE html>
<html lang="en-us">
  <head>

  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1980 height=1080></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Jingwei·Carrying Stones to Fill the Hole of Hatred</div>
      </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      // GitHub Pages / some mobile browsers open /repo without trailing slash; relative "Build/"
      // then resolves to the wrong host path. Normalize once, then use absolute-from-root paths.
      (function normalizeProjectBaseUrl() {
        var path = window.location.pathname;
        if (path.endsWith("/index.html")) path = path.slice(0, -10);
        if (path.length > 0 && !path.endsWith("/")) {
          var q = window.location.search || "";
          var h = window.location.hash || "";
          history.replaceState(null, "", window.location.origin + path + "/" + q + h);
        }
      })();

      function getRuntimeBasePath() {
        var path = window.location.pathname;
        if (path.endsWith("/index.html")) path = path.slice(0, -10);
        if (!path.endsWith("/")) path += "/";
        return path;
      }

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var basePath = getRuntimeBasePath();
      var buildUrl = basePath + "Build";
      var loaderUrl = buildUrl + "/ygwenjianjia.loader.js";
      // Largest asset: hosted on Tencent CloudBase (signed URL; renew in console when expired).
      // Second link you provided also points to ygwenjianjia.data (alternate signature) — wasm stays on same origin unless you send a ygwenjianjia.wasm URL.
      var remoteDataUrl =
        "https://636c-cloud1-d6ghy56bs51a0e918-1429453887.tcb.qcloud.la/ygwenjianjia.data?sign=2617afcf7e4f7521caa694c78098ea9b&t=1778484330";
      var config = {
        dataUrl: remoteDataUrl,
        frameworkUrl: buildUrl + "/ygwenjianjia.framework.js",
        codeUrl: buildUrl + "/ygwenjianjia.wasm",
        streamingAssetsUrl: basePath + "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Jingwei·Carrying Stones to Fill the Hole of Hatred",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      // Treat phones, tablets, and iPadOS (desktop UA) as mobile for layout & perf.
      var ua = navigator.userAgent || "";
      var isIPadOS = navigator.maxTouchPoints > 1 && /Macintosh/.test(ua);
      var isMobile = /iPhone|iPad|iPod|Android|Mobile|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua) || isIPadOS;

      if (isMobile) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";

        // Lower render resolution on mobile to reduce GPU/RAM pressure (critical for WebGL).
        config.devicePixelRatio = 1;
        // Prefer default GPU profile on phones (less likely to exhaust resources than "high performance").
        config.webglContextAttributes = {
          alpha: false,
          antialias: false,
          depth: true,
          stencil: true,
          preserveDrawingBuffer: false,
          powerPreference: "default"
        };
      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:

        canvas.style.width = "1980px";
        canvas.style.height = "1080px";
      }

      loadingBar.style.display = "block";

      // Unity IndexedDB cache (UnityCache) speeds repeat visits; some vendor browsers hang on IDB — skip only there.
      (function setUnityCachePolicy() {
        var u = navigator.userAgent || "";
        window.__unityAvoidIDBCache =
          /MiuiBrowser|MiBrowser|XiaoMi\/|\sXiaomi\/|HUAWEI|HBPC\/|HonorBrowser|HeyTapBrowser|HeyTap|heytap|OPPOBrowser|VivoBrowser|Quark|\bQQBrowser\/|MQQBrowser|UCBrowser| dingtalk\/|TaobaoBrowser|baidubrowser/i.test(u);
      })();

      // Hint the browser to warm connections / start large downloads in parallel with loader.js.
      (function preloadBuildAssets() {
        var origin = window.location.origin;
        function abs(p) {
          return origin + (p.charAt(0) === "/" ? p : "/" + p);
        }
        function add(href, as) {
          var l = document.createElement("link");
          l.rel = "preload";
          l.href = abs(href);
          l.as = as;
          if (as === "fetch" || as === "script") l.setAttribute("crossorigin", "anonymous");
          document.head.appendChild(l);
        }
        var pc = document.createElement("link");
        pc.rel = "preconnect";
        pc.href = origin;
        document.head.appendChild(pc);
        var tcb = document.createElement("link");
        tcb.rel = "preconnect";
        tcb.href = "https://636c-cloud1-d6ghy56bs51a0e918-1429453887.tcb.qcloud.la";
        tcb.crossOrigin = "anonymous";
        document.head.appendChild(tcb);
        add(buildUrl + "/ygwenjianjia.wasm", "fetch");
        var dPre = document.createElement("link");
        dPre.rel = "preload";
        dPre.href = remoteDataUrl;
        dPre.as = "fetch";
        dPre.setAttribute("crossorigin", "anonymous");
        document.head.appendChild(dPre);
        add(buildUrl + "/ygwenjianjia.framework.js", "script");
      })();

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onerror = function () {
        unityShowBanner("无法加载 " + loaderUrl + "。请检查网络或使用 Chrome 打开。", "error");
      };
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
